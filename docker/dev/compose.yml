name: user-service-dev

services:
  mysql:
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-user_service}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - user_service_mysql_data_dev:/var/lib/mysql
      - ./dev/services/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]

  user-service:
    image: ${USER_SERVICE_IMAGE:-user-service:dev}
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-user_service}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-abcdefghijklmnopqrstuvwxyz12345678901234567890}
      USER_SERVICE_INTERNAL_JWT_SECRET: ${USER_SERVICE_INTERNAL_JWT_SECRET:-abcdefghijklmnopqrstuvwxyz12345678901234567890}
      USER_SERVICE_INTERNAL_JWT_ISSUER: ${USER_SERVICE_INTERNAL_JWT_ISSUER:-api-gateway}
      USER_SERVICE_INTERNAL_JWT_AUDIENCE: ${USER_SERVICE_INTERNAL_JWT_AUDIENCE:-internal-services}

volumes:
  user_service_mysql_data_dev:
