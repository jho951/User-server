spring:
  application:
    name: user-service
  profiles:
    default: dev

features:
  public-user-api:
    enabled: true
  internal-user-api:
    enabled: true

security:
  jwt:
    enabled: true
    issuer: ${USER_SERVICE_INTERNAL_JWT_ISSUER:${AUTH_JWT_ISSUER:}}
    secret: ${USER_SERVICE_INTERNAL_JWT_SECRET:${AUTH_JWT_SECRET:}}
    audience: ${USER_SERVICE_INTERNAL_JWT_AUDIENCE:${AUTH_JWT_AUDIENCE:}}
    internal-scope: ${USER_SERVICE_INTERNAL_JWT_SCOPE:${AUTH_INTERNAL_SCOPE:internal}}

auditlog:
  enabled: ${AUDITLOG_ENABLED:true}
  service-name: ${AUDITLOG_SERVICE_NAME:${spring.application.name:user-service}}
  env: ${AUDITLOG_ENV:${spring.profiles.active:local}}
  file-path: ${AUDITLOG_FILE_PATH:./logs/audit.log}
  async-enabled: ${AUDITLOG_ASYNC_ENABLED:true}
  async-thread-count: ${AUDITLOG_ASYNC_THREAD_COUNT:2}
  async-queue-capacity: ${AUDITLOG_ASYNC_QUEUE_CAPACITY:1000}

platform:
  governance:
    enabled: ${PLATFORM_GOVERNANCE_ENABLED:true}
    audit:
      enabled: ${PLATFORM_GOVERNANCE_AUDIT_ENABLED:${AUDITLOG_ENABLED:true}}
      service-name: ${PLATFORM_GOVERNANCE_AUDIT_SERVICE_NAME:${spring.application.name:user-service}}
      environment: ${PLATFORM_GOVERNANCE_AUDIT_ENVIRONMENT:${spring.profiles.active:local}}
      failure-policy: ${PLATFORM_GOVERNANCE_AUDIT_FAILURE_POLICY:FAIL_CLOSED}
      identity:
        enabled: ${PLATFORM_GOVERNANCE_AUDIT_IDENTITY_ENABLED:true}
        validation-enabled: ${PLATFORM_GOVERNANCE_AUDIT_IDENTITY_VALIDATION_ENABLED:true}
        fail-on-validation-error: ${PLATFORM_GOVERNANCE_AUDIT_IDENTITY_FAIL_ON_VALIDATION_ERROR:true}
    engine:
      strict: ${PLATFORM_GOVERNANCE_ENGINE_STRICT:false}
    violation:
      action: ${PLATFORM_GOVERNANCE_VIOLATION_ACTION:DENY}
      handler-failure-fatal: ${PLATFORM_GOVERNANCE_VIOLATION_HANDLER_FAILURE_FATAL:false}
    operational:
      fail-fast-enabled: ${PLATFORM_GOVERNANCE_OPERATIONAL_FAIL_FAST_ENABLED:true}
      production-profiles: ${PLATFORM_GOVERNANCE_OPERATIONAL_PRODUCTION_PROFILES:prod}
      allow-non-strict-engine-in-production: ${PLATFORM_GOVERNANCE_OPERATIONAL_ALLOW_NON_STRICT_ENGINE_IN_PRODUCTION:false}
      require-policy-config-in-enforcing-mode: ${PLATFORM_GOVERNANCE_OPERATIONAL_REQUIRE_POLICY_CONFIG_IN_ENFORCING_MODE:false}
      require-fatal-handler-failures-in-production: ${PLATFORM_GOVERNANCE_OPERATIONAL_REQUIRE_FATAL_HANDLER_FAILURES_IN_PRODUCTION:true}
