spring:
  datasource:
    url: jdbc:h2:mem:user_service_test;MODE=MYSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        type:
          preferred_uuid_jdbc_type: CHAR

features:
  public-user-api:
    enabled: true
  internal-user-api:
    enabled: true

platform:
  governance:
    audit:
      enabled: false
  security:
    boundary:
      public-paths:
        - /actuator/**
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /favicon.ico
        - /error
        - /users/signup
      protected-paths:
        - /users/**
      admin-paths: []
      internal-paths:
        - /internal/**
    auth:
      enabled: true
      internal-token-enabled: true
      jwt-secret: abcdefghijklmnopqrstuvwxyz12345678901234567890
      jwt-issuer: auth-service
      jwt-audience: user-service
      internal-required-authorities:
        - SCOPE_internal
      gateway-header:
        enabled: true
    ip-guard:
      enabled: false
    rate-limit:
      enabled: false
